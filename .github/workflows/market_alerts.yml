# .github/workflows/market_alerts.yml
# =====================================================
# Multibagger Engine — Cloud Alert Engine
# Runs every 30 min, Mon-Fri, 9am-5pm IST
# Sends Telegram alerts for BSE filings on your stocks
# =====================================================

name: Market Alerts (BSE → Telegram)

on:
  schedule:
    # Every 30 min, Mon-Fri, 3:30-11:30 UTC = 9:00-17:00 IST
    - cron: "0,30 3-11 * * 1-5"
  workflow_dispatch:   # manual trigger from Actions tab

jobs:
  run-alerts:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests pandas --quiet

      - name: Run alert engine
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python cloud_alert_engine.py

      - name: Commit updated seen_alerts.json
        run: |
          git config user.name  "Alert Bot"
          git config user.email "alerts@multibagger"
          git add seen_alerts.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git pull --rebase origin main || true
          git commit -m "seen_alerts update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push || true
