# ============================================================
# .github/workflows/catalyst.yml — v1.0
# SESSION 40: Decoupled from alert_engine.yml
#
# ONLY runs --catalyst-only mode.
# Every 5 min, 9am-4:30pm IST weekdays.
# Fast job: polls BSE -> scores catalysts -> sends Telegram if material event.
# No news scan, no morning brief, no action plan.
# Works 24/7 — independent of PC / app being open.
# ============================================================

name: Catalyst Scorer

on:
  schedule:
    - cron: '*/5 3-11 * * 1-5'   # every 5 min, 8:30am-5:00pm IST, Mon-Fri
  workflow_dispatch:

jobs:
  catalyst_only:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install --quiet pandas requests

      - name: Run Catalyst Scorer
        env:
          TELEGRAM_TOKEN:     ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHAT_IDS:  ${{ secrets.TELEGRAM_CHAT_IDS }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        run: python cloud_alert_engine.py --catalyst-only

      - name: Save seen hashes
        run: |
          git config user.email "bot@multibagger-alerts.local"
          git config user.name  "Multibagger Alert Bot"
          git add -f seen_hashes.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "catalyst: update seen hashes [skip ci]"
          git push || true
        continue-on-error: true
