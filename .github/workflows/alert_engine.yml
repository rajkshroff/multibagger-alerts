# ============================================================
# .github/workflows/alert_engine.yml — v3.0
#
# 3 TRIGGER TYPES:
#   PUSH (CSVs updated)  → TYPE 1: Action Plan (engine just ran)
#   7:30am daily         → TYPE 2: Morning Brief
#   Every hour 9am-6pm  → TYPE 3: Hourly News scan
#
# SECRETS: TELEGRAM_TOKEN + TELEGRAM_CHAT_ID (already set)
# ============================================================

name: Multibagger Alert Engine v3

on:
  push:
    paths:
      - 'composite_scores.csv'
      - 'action_language.csv'
      - 'early_alerts.csv'
      - 'watchlist_for_cloud.csv'
      - 'market_intelligence.csv'
    branches: [ main ]

  schedule:
    - cron: '*/15 3-11 * * 1-5'  # 9:00am–4:30pm IST — Corp Announcements
    - cron: '0 2  * * *'    # 7:30am IST  — Morning Brief
    - cron: '30 3  * * *'   # 9:00am IST  — Hourly News
    - cron: '30 4  * * *'   # 10:00am IST
    - cron: '30 5  * * *'   # 11:00am IST
    - cron: '30 6  * * *'   # 12:00pm IST
    - cron: '30 7  * * *'   # 1:00pm IST
    - cron: '30 8  * * *'   # 2:00pm IST
    - cron: '30 9  * * *'   # 3:00pm IST
    - cron: '30 10 * * *'   # 4:00pm IST
    - cron: '30 11 * * *'   # 5:00pm IST
    - cron: '30 12 * * *'   # 6:00pm IST

  workflow_dispatch:
    inputs:
      mode:
        description: 'Force mode'
        required: false
        default: 'auto'
        type: choice
        options: [auto, test, morning_brief]

jobs:
  alert:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install --quiet pandas requests yfinance

      - name: Run Alert Engine
        env:
          TELEGRAM_TOKEN:      ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHAT_IDS:   ${{ secrets.TELEGRAM_CHAT_IDS }}
          TRIGGERED_BY_PUSH:   ${{ github.event_name == 'push' && 'true' || 'false' }}
          FORCE_MORNING_BRIEF: ${{ github.event.inputs.mode == 'morning_brief' && 'true' || 'false' }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        run: |
          if [ "${{ github.event.inputs.mode }}" = "test" ]; then
            python cloud_alert_engine.py --test
          else
            python cloud_alert_engine.py
          fi

      - name: Configure git
        run: |
          git config user.email "bot@multibagger-alerts.local"
          git config user.name  "Multibagger Alert Bot"

      - name: Save state (dedup hashes — YML owns git, not Python)
        run: |
          git add -f seen_hashes.json morning_brief_sent.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: alert state [skip ci]"
          git push || true
        continue-on-error: true

  # ── CORPORATE ANNOUNCEMENTS (every 15 min, 9am-4:30pm IST) ─
  corp_announcements:
    runs-on: ubuntu-latest
    # Runs on schedule (every 15min market hours) AND manual dispatch for testing
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install --quiet requests pandas

      - name: Run Corporate Announcements Poller
        env:
          TELEGRAM_TOKEN:      ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHAT_IDS:   ${{ secrets.TELEGRAM_CHAT_IDS }}
        run: python build_corporate_announcements.py

      - name: Save seen hashes
        run: |
          git config user.email "bot@multibagger-alerts.local"
          git config user.name  "Multibagger Alert Bot"
          git add -f corp_announcements_seen.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "corp_anns: update seen hashes [skip ci]"
          git push || true
        continue-on-error: true
