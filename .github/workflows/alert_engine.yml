# ============================================================
# .github/workflows/alert_engine.yml
# SESSION 37  — Full 7-day schedule
#
# PLACE THIS FILE AT:
#   your-github-repo/.github/workflows/alert_engine.yml
#
# REQUIRED SECRETS (repo Settings → Secrets → Actions → New):
#   TELEGRAM_TOKEN    — from @BotFather on Telegram
#   TELEGRAM_CHAT_ID  — your Telegram chat/group ID
#
# SCHEDULE (all times IST = UTC+5:30):
#   Morning brief  → 8:30 AM IST daily (3:00 UTC)
#   Intraday scan  → every 30min from 7:00 AM to 8:00 PM IST, 7 days
#                    (1:30 UTC to 14:30 UTC)
#
# WHAT EACH RUN DOES:
#   Morning brief  → market state + top picks + sector summary → Telegram
#   Intraday scan  → BSE + NSE announcements + macro RSS → Telegram on match
#
# COST: ~0 (GitHub Actions free tier: 2000 min/month)
#   Morning brief: 1 run/day × 30 days = 30 runs ≈ 15 min/month
#   Intraday scan: 26 runs/day × 30 days = 780 runs ≈ 390 min/month
#   Total: ~405 min/month — well within free tier
# ============================================================

name: Multibagger Alert Engine

on:
  schedule:
    # ── Morning brief: 8:30 AM IST = 03:00 UTC, every day ──
    - cron: '0 3 * * *'

    # ── Intraday scan: every 30min, 7am-8pm IST, 7 days ────
    # 7:00 AM IST  = 01:30 UTC  → cron '30 1 * * *'
    # 8:00 PM IST  = 14:30 UTC  → cron '30 14 * * *'
    # GitHub cron can't do "*/30 from X to Y" in one line,
    # so we schedule specific hours:
    - cron: '*/30 1 * * *'   # 06:30–07:30 IST (partial)
    - cron: '*/30 2 * * *'   # 07:30–08:30 IST
    - cron: '*/30 4 * * *'   # 09:30–10:30 IST
    - cron: '*/30 5 * * *'   # 10:30–11:30 IST
    - cron: '*/30 6 * * *'   # 11:30–12:30 IST
    - cron: '*/30 7 * * *'   # 12:30–13:30 IST
    - cron: '*/30 8 * * *'   # 13:30–14:30 IST
    - cron: '*/30 9 * * *'   # 14:30–15:30 IST
    - cron: '*/30 10 * * *'  # 15:30–16:30 IST
    - cron: '*/30 11 * * *'  # 16:30–17:30 IST
    - cron: '*/30 12 * * *'  # 17:30–18:30 IST
    - cron: '*/30 13 * * *'  # 18:30–19:30 IST
    - cron: '*/30 14 * * *'  # 19:30–20:30 IST

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: false
        default: 'intraday'
        type: choice
        options:
          - intraday
          - morning-brief

jobs:
  # ── Job 1: Morning brief (only at 03:00 UTC) ──────────────
  morning-brief:
    runs-on: ubuntu-latest
    # Only run this job when triggered by the 03:00 UTC cron
    # OR when manually triggered with mode=morning-brief
    if: |
      (github.event_name == 'schedule' && startsWith(github.event.schedule, '0 3')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'morning-brief')

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests pandas -q

      - name: Run morning brief
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python cloud_alert_engine.py --morning-brief

      - name: Commit seen_alerts.json
        uses: EndBug/add-and-commit@v9
        with:
          add: 'seen_alerts.json'
          message: 'chore: update seen_alerts (morning brief)'
          default_author: github_actions

  # ── Job 2: Intraday scan (all other cron times) ───────────
  intraday-scan:
    runs-on: ubuntu-latest
    # Skip at 03:00 UTC (that's morning brief time)
    # Run at all other scheduled times + manual intraday trigger
    if: |
      (github.event_name == 'schedule' && !startsWith(github.event.schedule, '0 3')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'intraday')

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests pandas -q

      - name: Run intraday scan
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python cloud_alert_engine.py

      - name: Commit seen_alerts.json
        uses: EndBug/add-and-commit@v9
        with:
          add: 'seen_alerts.json'
          message: 'chore: update seen_alerts (intraday)'
          default_author: github_actions
