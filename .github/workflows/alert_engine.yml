# ============================================================
# .github/workflows/alert_engine.yml
# SESSION 42 — 3x Daily Action Plan + 7:30am Morning Brief
#
# PLACE THIS FILE IN:
#   Multibagger_App/multibagger-alerts/.github/workflows/alert_engine.yml
#
# SCHEDULE (all times IST = UTC+5:30):
#   7:30am IST  = 2:00 UTC   → Morning Brief (daily)
#   9:00am IST  = 3:30 UTC   → Intraday (push-triggered after 8:15am engine run)
#   11:30am IST = 6:00 UTC   → Intraday (push-triggered after 11am engine run)
#   3:00pm IST  = 9:30 UTC   → Intraday (push-triggered after 2:30pm engine run)
#   Every 30min 7am-8pm IST  → RSS/early_alerts intraday check
#   On push to CSVs          → Immediate intraday check (engine just ran)
#
# PC-INDEPENDENCE:
#   All cron jobs run in GitHub cloud — no PC needed.
#   When engine runs on PC, git_sync.cmd pushes CSVs → push trigger fires.
#   If PC is off, scheduled crons still send morning brief + status updates
#   using the LAST pushed CSV data (could be from yesterday's run).
# ============================================================

name: Multibagger Alert Engine

on:
  push:
    paths:
      - 'composite_scores.csv'
      - 'action_language.csv'
      - 'early_alerts.csv'
      - 'watchlist_for_cloud.csv'
      - 'market_intelligence.csv'
    branches: [ main ]

  schedule:
    # ── MORNING BRIEF — 7:30am IST (2:00 UTC) ────────────────
    - cron: '0 2 * * *'

    # ── INTRADAY EVERY 30 MIN — 7am to 8pm IST ───────────────
    # 7am IST = 1:30 UTC | 8pm IST = 14:30 UTC
    - cron: '30 1 * * *'   # 7:00am IST
    - cron: '0  2 * * *'   # 7:30am IST  (same as morning brief — brief fires once, then intraday)
    - cron: '30 2 * * *'   # 8:00am IST
    - cron: '0  3 * * *'   # 8:30am IST
    - cron: '30 3 * * *'   # 9:00am IST
    - cron: '0  4 * * *'   # 9:30am IST
    - cron: '30 4 * * *'   # 10:00am IST
    - cron: '0  5 * * *'   # 10:30am IST
    - cron: '30 5 * * *'   # 11:00am IST
    - cron: '0  6 * * *'   # 11:30am IST
    - cron: '30 6 * * *'   # 12:00pm IST
    - cron: '0  7 * * *'   # 12:30pm IST
    - cron: '30 7 * * *'   # 1:00pm IST
    - cron: '0  8 * * *'   # 1:30pm IST
    - cron: '30 8 * * *'   # 2:00pm IST
    - cron: '0  9 * * *'   # 2:30pm IST
    - cron: '30 9 * * *'   # 3:00pm IST
    - cron: '0  10 * * *'  # 3:30pm IST
    - cron: '30 10 * * *'  # 4:00pm IST
    - cron: '0  11 * * *'  # 4:30pm IST
    - cron: '30 11 * * *'  # 5:00pm IST
    - cron: '0  12 * * *'  # 5:30pm IST
    - cron: '30 12 * * *'  # 6:00pm IST
    - cron: '0  13 * * *'  # 6:30pm IST
    - cron: '30 13 * * *'  # 7:00pm IST
    - cron: '0  14 * * *'  # 7:30pm IST
    - cron: '30 14 * * *'  # 8:00pm IST

  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - morning_brief
          - action_plan
          - test

jobs:
  alert:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --quiet pandas requests yfinance

      - name: Run Alert Engine
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          # Pass dispatch mode if manually triggered
          DISPATCH_MODE: ${{ github.event.inputs.mode || 'auto' }}
          # Tell engine if this was push-triggered (CSV just updated)
          TRIGGERED_BY_PUSH: ${{ github.event_name == 'push' && 'true' || 'false' }}
          # Force morning brief if manually triggered
          FORCE_MORNING_BRIEF: ${{ github.event.inputs.mode == 'morning_brief' && 'true' || 'false' }}
        run: |
          python cloud_alert_engine.py

      - name: Configure git
        run: |
          git config user.email "bot@multibagger-alerts.local"
          git config user.name  "Multibagger Alert Bot"

      - name: Push state files (seen_hashes, morning_brief_sent)
        run: |
          git add -f seen_hashes.json morning_brief_sent.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: update alert state [skip ci]"
          git push || true
        continue-on-error: true
